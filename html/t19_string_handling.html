<!DOCTYPE html>
<html lang="en">

<head>
  <title>T19-string handling</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/dtec_favicon.png">
</head>

<!--*************************************************************
  BODY
**************************************************************-->

<body>
  <h1>T19-string handling</h1>
  
  <form id="shoppingForm" onsubmit="return false;">
    <h2>Shopping list</h2><br>
    <label>Add an item:</label><br>
    <input type="text" id="itemField" minlength="1" maxlength="30" pattern="[\x00-\x7F]+" title="Only ASCII characters are allowed"><br>
    <input type="submit" onclick="getFormInput()" value="Add to list"><br>
    <input type="submit" onclick="showList()" value="Show Items"><br>
  </form>

  <br>
  
  <div id="spaceForJavaScriptOutput">

    The output of your script will go here.

  </div>

  <script src="../t19_string_handling.js"></script>

</body>

</html>
